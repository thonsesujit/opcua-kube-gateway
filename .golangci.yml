run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - nilerr
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/opcua-kube-gateway/opcua-kube-gateway

issues:
  exclude-dirs:
    - hack
    - simulator
  exclude-generated-strict: true
