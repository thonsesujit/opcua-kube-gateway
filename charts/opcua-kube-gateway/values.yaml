replicaCount: 1

image:
  repository: ghcr.io/opcua-kube-gateway/opcua-kube-gateway
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

leaderElection:
  enabled: true

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

metrics:
  port: 8080

healthProbe:
  port: 8081

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

grafanaDashboard:
  enabled: false
  labels:
    grafana_dashboard: "1"

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
